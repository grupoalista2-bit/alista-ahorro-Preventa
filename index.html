<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1F4788;--blue-d:#133556;--red:#E31E24;--red-d:#b81219;
  --green:#1a9e5c;--orange:#e07b10;--purple:#6d3fd6;--teal:#0891b2;
  --bg:#f0f2f8;--border:#dde3ee;--txt:#18243d;--txt2:#6a7a9b;--sidebar:260px;
  --topbar:56px
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-bg{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(140deg,#0b1d3a 0%,var(--blue) 60%,#2c6ab5 100%);padding:16px}
.login-box{background:#fff;border-radius:14px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-brand{text-align:center;margin-bottom:28px}
.login-brand-name{font-size:26px;font-weight:800;color:var(--blue)}
.login-brand-name em{color:var(--red);font-style:normal}
.login-brand-sub{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.9px;margin-top:4px}
.lfield{margin-bottom:14px}
.lfield label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:6px}
.lfield input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;background:#f7f8fb;font-family:inherit;transition:.2s}
.lfield input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(31,71,136,.12)}
.login-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:4px}
.login-btn:active{background:var(--blue-d)}

/* APP SHELL */
.app{display:flex;min-height:100vh;min-height:100dvh}
/* Sidebar – desktop */
.sidebar{width:var(--sidebar);background:var(--blue);color:#fff;position:fixed;height:100vh;height:100dvh;left:0;top:0;display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .22s ease}
.sb-brand{padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-brand-name{font-size:17px;font-weight:800}
.sb-brand-name em{color:#ff7b7e;font-style:normal}
.sb-brand-sub{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.sb-user{padding:11px 18px;background:rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user-name{font-weight:700;font-size:14px}
.sb-role{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
.sb-role.admin{background:var(--red)}.sb-role.coadmin{background:var(--orange)}
.sb-role.preventista{background:#7c3aed}.sb-role.preparador{background:var(--teal)}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.sb-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.45;padding:12px 18px 3px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:rgba(255,255,255,.76);padding:12px 18px;text-align:left;cursor:pointer;font-size:14px;font-family:inherit;transition:.12s;border-left:3px solid transparent;min-height:44px}
.nav-item:active{background:rgba(255,255,255,.15)}
.nav-item.on{background:rgba(255,255,255,.16);color:#fff;border-left-color:#ff7b7e;font-weight:700}
.nav-icon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.sb-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.1)}
.logout{width:100%;padding:11px;background:rgba(227,30,36,.82);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:44px}
.logout:active{background:var(--red)}
/* Sidebar overlay (mobile) */
.sb-overlay{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.45);z-index:99}
.sb-overlay.open{display:block}
/* Main area */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
/* Topbar */
.topbar{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;height:var(--topbar);display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.05);position:sticky;top:0;z-index:40}
.topbar-title{font-size:16px;font-weight:700;color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;font-size:24px;color:var(--blue);line-height:1;min-width:44px;min-height:44px;align-items:center;justify-content:center}
.page{flex:1;padding:20px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* CARDS */
.card{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;border-left:4px solid var(--blue)}
.kpi.red{border-left-color:var(--red)}.kpi.green{border-left-color:var(--green)}
.kpi.orange{border-left-color:var(--orange)}.kpi.purple{border-left-color:var(--purple)}.kpi.teal{border-left-color:var(--teal)}
.kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px}
.kpi-val{font-size:20px;font-weight:800;color:var(--blue)}
.kpi.red .kpi-val{color:var(--red)}.kpi.green .kpi-val{color:var(--green)}
.kpi.orange .kpi-val{color:var(--orange)}.kpi.purple .kpi-val{color:var(--purple)}.kpi.teal .kpi-val{color:var(--teal)}

/* FORMS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--txt2);margin-bottom:5px}
.fg label em{color:var(--red);font-style:normal}
.fi,.fs{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;background:#fff;transition:.15s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,71,136,.1)}
.fi:disabled,.fs:disabled{background:#f4f6fb;color:var(--txt2)}
.fi.sm{padding:8px 10px;font-size:14px}
.fi.qty{width:70px}

/* BUTTONS */
.btn{padding:10px 16px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.12s;background:#fff;color:var(--txt);font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;min-height:44px;-webkit-appearance:none}
.btn:active{opacity:.85}
.btn.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.dan{background:var(--red);color:#fff;border-color:var(--red)}
.btn.ok{background:var(--green);color:#fff;border-color:var(--green)}
.btn.warn{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn.purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.sm{padding:7px 12px;font-size:13px;min-height:36px}
.btn.lg{padding:14px 24px;font-size:16px;min-height:52px}
.btn.full{width:100%}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* TABLE — scrollable on mobile */
.tw{overflow-x:auto;border-radius:8px;border:1.5px solid var(--border);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
th{background:#f4f6fb;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #eef0f6;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
/* Card-style rows on mobile instead of table */
.mcard{display:none;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.mcard-title{font-weight:700;font-size:14px;margin-bottom:4px}
.mcard-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;color:var(--txt2)}
.mcard-row strong{color:var(--txt)}

/* ORDER STATUS BADGES */
.st{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.st.creado{background:#f3f4f6;color:#374151}
.st.pendiente{background:#fff7ed;color:#c2410c}
.st.preparado{background:#eff6ff;color:#1d4ed8}
.st.en_transito{background:#f5f3ff;color:#6d28d9}
.st.entregado{background:#ecfdf5;color:#065f46}
.st.finalizado{background:#dcfce7;color:#14532d}

/* MODAL */
.ov{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(8,18,46,.56);z-index:200;display:flex;align-items:flex-end;justify-content:center;-webkit-overflow-scrolling:touch}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:22px 20px;width:100%;max-width:600px;max-height:90vh;max-height:90dvh;overflow-y:auto;box-shadow:0 -4px 32px rgba(0,0,0,.18);-webkit-overflow-scrolling:touch}
.modal.wide,.modal.xl{border-radius:16px 16px 0 0;max-width:100%}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mhd-title{font-size:16px;font-weight:700;color:var(--blue)}
.mcl{background:var(--bg);border:none;font-size:20px;cursor:pointer;color:var(--txt2);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%}

/* MISC */
.sinput{flex:1;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;min-width:0;-webkit-appearance:none}
.sinput:focus{outline:none;border-color:var(--blue)}
.alert{padding:11px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.alert.err{background:#fff0f0;border:1.5px solid #fca5a5;color:#b91c1c}
.alert.ok{background:#f0fdf4;border:1.5px solid #86efac;color:#15803d}
.alert.warn{background:#fffbeb;border:1.5px solid #fcd34d;color:#92400e}
.alert button{background:none;border:none;cursor:pointer;font-size:18px;color:inherit;line-height:1;flex-shrink:0;padding:0 4px}
.empty{text-align:center;padding:32px;color:var(--txt2);font-size:13px}
.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.on{background:#dcfce7;color:#166534}.badge.off{background:#fee2e2;color:#991b1b}
.badge.admin{background:#dbeafe;color:#1e40af}.badge.coadmin{background:#fef9c3;color:#854d0e}
.badge.preventista{background:#ede9fe;color:#5b21b6}.badge.preparador{background:#cffafe;color:#155e75}
.notif-dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-left:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes gps-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}

/* ART PICKER */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.art-btn{padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;text-align:left;min-height:54px}
.art-btn:active{border-color:var(--blue);background:#eef2fb}
.art-btn .ab-code{font-size:10px;color:var(--txt2);margin-bottom:2px}
.art-btn .ab-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3}
.art-btn .ab-price{font-size:12px;color:var(--blue);font-weight:700}

/* TOTALS BOX */
.totals{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px}
.trow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px}
.trow.big{border-top:2px solid var(--border);margin-top:8px;padding-top:12px;font-size:20px;font-weight:800;color:var(--red)}

/* CLI PICKER */
.cli-sel{background:#eef3fb;border:1.5px solid #b8cef0;border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.cli-item{padding:12px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;margin-bottom:8px;background:#fff;text-align:left;width:100%;font-family:inherit;display:block;min-height:48px}
.cli-item:active{border-color:var(--blue);background:#f0f4fb}

/* MAP */
.map-wrap{border-radius:10px;overflow:hidden;border:1.5px solid var(--border)}
.gps-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;margin-bottom:12px;flex-wrap:wrap}
.gps-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700}
.gps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gps-dot.on{background:var(--green);animation:pulse 1.5s infinite}
.gps-dot.off{background:#ccc}

/* CHART */
canvas.bc{display:block;width:100%;height:auto}
/* PREP TABLE */
.prep-row{display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr 1.5fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.prep-row:last-child{border-bottom:none}

/* ── RESPONSIVE ── */
@media(min-width:661px){
  .hamburger{display:none !important}
}
@media(max-width:900px){
  :root{--sidebar:230px}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:660px){
  :root{--sidebar:280px}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:flex !important}
  .page{padding:14px 12px}
  .card{padding:14px}
  .kpi-row{grid-template-columns:1fr 1fr}
  /* Hide table on mobile, show cards */
  .mobile-table table,.mobile-table th,.mobile-table td{display:none}
  .mobile-table .mcard{display:block}
  /* But keep small tables visible */
  .keep-table table,.keep-table th,.keep-table td{display:revert}
  .art-grid{grid-template-columns:1fr 1fr;max-height:200px}
  .modal{border-radius:16px 16px 0 0;padding:18px 16px}
  .ov{align-items:flex-end}
  .prep-row{grid-template-columns:1fr 1fr;gap:6px}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:380px){
  .kpi-row{grid-template-columns:1fr}
  .art-grid{grid-template-columns:1fr}
}

/* ── BOTTOM NAV (mobile only) ── */
.bottom-nav{display:none}
@media(max-width:660px){
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:90;
    background:#fff;border-top:1.5px solid var(--border);
    padding:0;padding-bottom:env(safe-area-inset-bottom,0px);
    box-shadow:0 -2px 12px rgba(0,0,0,.1)
  }
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 4px;background:none;border:none;cursor:pointer;font-family:inherit;
    color:var(--txt2);font-size:10px;font-weight:600;gap:3px;min-height:54px;
    position:relative;transition:.12s}
  .bn-item:active{background:var(--bg)}
  .bn-item.on{color:var(--blue)}
  .bn-icon{font-size:20px;line-height:1}
  .bn-dot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;
    background:var(--red);border-radius:50%;border:1.5px solid #fff}
  .page{padding-bottom:80px}
  .topbar{padding:0 12px;height:50px}
  .topbar-title{font-size:15px}
  .hamburger{display:none !important}
  .sidebar{display:none}
  .main{margin-left:0}
}
</style>
</head>

function parseFecha(s){
  try{var p=s.split(',')[0].trim().split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
  catch(e){return new Date(0);}
}
function inPeriod(v,period){
  var d=parseFecha(v.fecha);var now=new Date();
  if(period==='hoy')return d.toDateString()===now.toDateString();
  if(period==='semana'){var diff=(now-d)/864e5;return diff>=0&&diff<7;}
  if(period==='mes')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  if(period==='trim'){var dm=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());return dm>=0&&dm<3;}
  if(period==='anio')return d.getFullYear()===now.getFullYear();
  return true;
}

/* ═══════════════════════════
   LEAFLET MAP — LIVE GPS
═══════════════════════════ */
function LeafletMap(props){
  var mapRef=useRef(null);
  var mapInst=useRef(null);
  var layersRef=useRef({markers:[],tracks:[]});
  var initRef=useRef(false);

  useEffect(function(){
    if(!mapRef.current||initRef.current)return;
    initRef.current=true;
    var m=L.map(mapRef.current,{zoomControl:true,attributionControl:true})
      .setView(props.center||LOS_JURIOS,props.zoom||14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(m);
    mapInst.current=m;
    return function(){
      if(mapInst.current){mapInst.current.remove();mapInst.current=null;initRef.current=false;}
    };
  },[]);

  useEffect(function(){
    var m=mapInst.current;
    if(!m)return;
    layersRef.current.markers.forEach(function(l){l.remove();});
    layersRef.current.tracks.forEach(function(l){l.remove();});
    layersRef.current={markers:[],tracks:[]};
    var allLL=[];

    (props.tracks||[]).forEach(function(tr){
      if(!tr.points||tr.points.length<2)return;
      var lls=tr.points.map(function(p){return[p.lat,p.lng];});
      var pl=L.polyline(lls,{color:tr.color||'#E31E24',weight:5,opacity:0.85}).addTo(m);
      layersRef.current.tracks.push(pl);
      lls.forEach(function(ll){allLL.push(ll);});
    });

    (props.markers||[]).forEach(function(mk){
      if(mk.lat==null||mk.lng==null)return;
      var isMe=mk.isMe;
      var dot=isMe
        ? '<div style="width:22px;height:22px;background:'+mk.color+';border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5)"></div>'
        : '<div style="width:13px;height:13px;background:'+mk.color+';border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>';
      var icon=L.divIcon({html:dot,className:'',iconSize:isMe?[22,22]:[13,13],iconAnchor:isMe?[11,11]:[6,6]});
      var marker=L.marker([mk.lat,mk.lng],{icon:icon,zIndexOffset:isMe?1000:0}).addTo(m);
      if(mk.popup)marker.bindPopup(mk.popup);
      layersRef.current.markers.push(marker);
      allLL.push([mk.lat,mk.lng]);
    });

    if(props.livePos){
      m.panTo([props.livePos.lat,props.livePos.lng],{animate:true,duration:0.6});
    } else if(allLL.length>1&&!props.noFit){
      try{m.fitBounds(allLL,{padding:[40,40],maxZoom:16});}catch(e){}
    } else if(allLL.length===1){
      m.setView(allLL[0],15);
    }
  },[props.markers,props.tracks,props.livePos]);

  return E('div',{ref:mapRef,className:'map-wrap',style:{height:props.height||'380px',width:'100%'}});
}

/* ═══════════════════════════
   GPS HOOK — real watchPosition
═══════════════════════════ */
function useGPS(user){
  var _a=useState(getGPSStatus(user.id)),gpsOn=_a[0],setGpsOn=_a[1];
  var _b=useState(null),pos=_b[0],setPos=_b[1];
  var _c=useState(''),gpsErr=_c[0],setGpsErr=_c[1];
  var watchId=useRef(null);

  function startGPS(){
    if(!navigator.geolocation){setGpsErr('Este dispositivo no tiene GPS.');return;}
    setGpsErr('');
    setGPSStatus(user.id,true);
    setGpsOn(true);
    watchId.current=navigator.geolocation.watchPosition(
      function(p){
        var lat=p.coords.latitude,lng=p.coords.longitude;
        setPos({lat:lat,lng:lng,acc:p.coords.accuracy});
        saveGPSPoint(user.id,lat,lng);
        sl('gps_last_'+user.id,{lat:lat,lng:lng,ts:Date.now(),nombre:user.nombre||user.username});
      },
      function(err){
        var msgs={1:'Permiso GPS denegado. Habilitalo en Ajustes > Privacidad.',2:'GPS no disponible.',3:'Tiempo de espera GPS agotado.'};
        setGpsErr(msgs[err.code]||'Error GPS.');
        setGpsOn(false);setGPSStatus(user.id,false);
      },
      {enableHighAccuracy:true,timeout:20000,maximumAge:3000}
    );
  }

  function stopGPS(){
    if(watchId.current!==null){navigator.geolocation.clearWatch(watchId.current);watchId.current=null;}
    setGPSStatus(user.id,false);
    setGpsOn(false);
    sl('gps_last_'+user.id,null);
  }

  useEffect(function(){
    if(gpsOn&&watchId.current===null)startGPS();
    return function(){
      if(watchId.current!==null){navigator.geolocation.clearWatch(watchId.current);watchId.current=null;}
    };
  },[]);

  return {gpsOn:gpsOn,pos:pos,gpsErr:gpsErr,startGPS:startGPS,stopGPS:stopGPS};
}

/* ═══════════════════════════

function MapaGPS(props){

  useEffect(function(){
    setPts(getGPSPoints(user.id,null));

  useEffect(function(){
    var iv=setInterval(function(){setPts(getGPSPoints(user.id,null));},3000);

          )

        E('div',{style:{fontSize:13,color:'var(--txt2)',lineHeight:1.6}},

}

function Articulos(props){
  var user=props.user;
  var canEdit=user.role!=='preventista'&&user.role!=='preparador';
  var canPrice=user.role==='admin';
  var _a=useState(gl('arts',[])),arts=_a[0],setArts=_a[1];
  var _b=useState(''),q=_b[0],setQ=_b[1];
  var _c=useState(null),modal=_c[0],setModal=_c[1];
  var _d=useState({cod:'',codArt:'',desc:'',precio:0,costo:0,estado:'activo'}),form=_d[0],setForm=_d[1];
  var _e=useState(null),msg=_e[0],setMsg=_e[1];

  function save(a){setArts(a);sl('arts',a);}
  function F(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function flash(t,m){setMsg({t:t,m:m});setTimeout(function(){setMsg(null);},3000);}

  var filtered=arts.filter(function(a){return a.cod.toLowerCase().includes(q.toLowerCase())||a.desc.toLowerCase().includes(q.toLowerCase());});

  function handleSave(){
    if(!form.cod.trim()||!form.desc.trim()){flash('err','Código y descripción son obligatorios.');return;}
    var others=arts.filter(function(a){return a.id!==form.id;});
    if(others.find(function(a){return a.cod.trim()===form.cod.trim();})){flash('err','El código ya existe.');return;}
    if(modal==='new')save(arts.concat([Object.assign({},form,{id:uid(),precio:parseFloat(form.precio)||0,costo:parseFloat(form.costo)||0})]));
    else save(arts.map(function(a){return a.id===form.id?Object.assign({},form,{precio:parseFloat(form.precio)||0,costo:parseFloat(form.costo)||0}):a;}));
    setModal(null);flash('ok','Artículo guardado.');
  }
  function handleDel(id){
    if(!confirm('¿Eliminar este artículo?'))return;
    save(arts.filter(function(a){return a.id!==id;}));
  }
  function doExport(){
    exportXLSX([{name:'Artículos',rows:arts.map(function(a){return{'Código':a.cod,'Cód.Artículo':a.codArt,'Descripción':a.desc,'Precio Costo':a.costo||0,'Precio Base':a.precio,'Estado':a.estado};})}],'articulos_alista.xlsx');
  }
  function doImport(e){
    var file=e.target.files[0];if(!file)return;
    e.target.value='';
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var wb=XLSX.read(data,{type:'array'});
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        if(!rows.length){flash('err','Archivo vacío.');return;}
        var cur=gl('arts',[]);var n=0;
        rows.forEach(function(row){
          var cod=String(row['Código']||row['Codigo']||'').trim();
          var desc=String(row['Descripción']||row['Descripcion']||'').trim();
          if(!cod||!desc)return;
          var precio=parseFloat(row['Precio Base']||row['precio']||0)||0;
          var costo=parseFloat(row['Precio Costo']||row['Costo']||0)||0;
          var codArt=String(row['Cód.Artículo']||row['Cod.Articulo']||'').trim();
          var estado=String(row['Estado']||'activo').toLowerCase().trim();
          var idx=cur.findIndex(function(a){return a.cod===cod;});
          if(idx>=0)cur[idx]=Object.assign({},cur[idx],{codArt:codArt,desc:desc,precio:precio,costo:costo,estado:estado});
          else cur.push({id:uid(),cod:cod,codArt:codArt,desc:desc,precio:precio,costo:costo,estado:estado});
          n++;
        });
        save(cur);flash('ok',n+' artículos importados/actualizados.');
      }catch(err){flash('err','Error al leer el archivo: '+err.message);}
    };
    reader.onerror=function(){flash('err','No se pudo leer el archivo.');};
    reader.readAsArrayBuffer(file);
  }

  return E('div',null,
    E('div',{className:'card'},
      E('div',{className:'card-hd'},
        E('div',{className:'card-title'},'📦 Artículos y Precios'),
        E('div',{className:'brow'},
          canEdit&&E('button',{className:'btn pri',onClick:function(){setForm({cod:'',codArt:'',desc:'',precio:0,costo:0,estado:'activo'});setModal('new');}},'+ Nuevo'),
          E('button',{className:'btn',onClick:doExport},'📊 Exportar'),
          canEdit&&E('label',{className:'btn',style:{cursor:'pointer',marginBottom:0}},'📥 Importar',
            E('input',{type:'file',accept:'.xlsx,.xls',style:{display:'none'},onChange:doImport}))
        )
      ),
      msg&&E(Alert,{t:msg.t,msg:msg.m,onClose:function(){setMsg(null);}}),
      E('div',{className:'search-row',style:{marginBottom:14}},
        E('input',{className:'sinput',placeholder:'Buscar…',value:q,onChange:function(e){setQ(e.target.value);}}),
        E('span',{style:{fontSize:12,color:'var(--txt2)'}},filtered.length+' resultados')
      ),
      E('div',{className:'tw'},E('table',null,
        E('thead',null,E('tr',null,
          E('th',null,'Código'),E('th',null,'Descripción'),
          canPrice&&E('th',null,'P. Costo'),E('th',null,'Precio Base'),
          canPrice&&E('th',null,'Margen'),E('th',null,'Estado'),
          canEdit&&E('th',null,'Acciones')
        )),
        E('tbody',null,filtered.length===0?E('tr',null,E('td',{colSpan:7,className:'empty'},'Sin resultados.')):
          filtered.map(function(a){
            var margen=a.precio>0&&a.costo>0?Math.round((a.precio-a.costo)/a.precio*100):null;
            return E('tr',{key:a.id},
              E('td',null,E('strong',null,a.cod)),
              E('td',null,a.desc),
              canPrice&&E('td',null,a.costo>0?'$'+$(a.costo):'—'),
              E('td',null,E('strong',{style:{color:'var(--blue)'}},'$'+$(a.precio))),
              canPrice&&E('td',null,margen!==null?E('span',{style:{padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:700,
                background:margen>30?'#dcfce7':margen>15?'#fef9c3':'#fee2e2',
                color:margen>30?'#166534':margen>15?'#854d0e':'#991b1b'}},margen+'%'):'—'),
              E('td',null,E('span',{className:'badge '+(a.estado==='activo'?'on':'off')},a.estado)),
              canEdit&&E('td',null,E('div',{className:'brow'},
                E('button',{className:'btn sm',onClick:function(){setForm(Object.assign({},a,{costo:a.costo||0}));setModal('edit');}},'✏️'),
                E('button',{className:'btn sm dan',onClick:function(){handleDel(a.id);}}, 'Eliminar')

function BarChart(props){
  var ref=useRef();
  useEffect(function(){
    var cv=ref.current;if(!cv||!props.data.length)return;
    var ctx=cv.getContext('2d');
    var W=cv.width,H=cv.height,PL=62,PR=16,PT=18,PB=46,cW=W-PL-PR,cH=H-PT-PB;
    ctx.clearRect(0,0,W,H);
    var maxV=Math.max.apply(null,props.data.map(function(d){return d.v;}).concat([1]));
    var gap=cW/props.data.length;
    var bW=Math.min(gap*.68,44);
    var color=props.color||'#1F4788';
    for(var i=0;i<=4;i++){
      var gy=PT+cH*(1-i/4);
      ctx.strokeStyle='#eaecf4';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PL,gy);ctx.lineTo(PL+cW,gy);ctx.stroke();
      ctx.fillStyle='#9aaabf';ctx.font='10px sans-serif';ctx.textAlign='right';
      ctx.fillText('$'+$i(maxV*i/4),PL-5,gy+4);
    }
    ctx.strokeStyle='#d0d6e8';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(PL,PT);ctx.lineTo(PL,PT+cH);ctx.lineTo(PL+cW,PT+cH);ctx.stroke();
    props.data.forEach(function(d,i){
      var bH=d.v>0?(d.v/maxV)*cH:0;
      var x=PL+gap*i+(gap-bW)/2,y=PT+cH-bH;
      var g=ctx.createLinearGradient(x,y,x,PT+cH);g.addColorStop(0,color);g.addColorStop(1,color+'44');
      ctx.fillStyle=g;ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x,y,bW,bH,3);else ctx.rect(x,y,bW,bH);
      ctx.fill();
      ctx.fillStyle='#7888a0';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(d.l,x+bW/2,PT+cH+18);
      if(bH>22){ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.fillText('$'+$i(d.v),x+bW/2,y+14);}
    });
  },[props.data,props.color]);
  if(!props.data.length)return E('div',{className:'empty'},'Sin datos para el período.');
  return E('div',{style:{width:'100%',overflowX:'auto'}},
    E('canvas',{ref:ref,className:'bc',width:660,height:200,style:{height:'200px'}}));
}

  var _c=useState({nombre:'',username:'',password:'',role:'preventista',activo:true}),form=_c[0],setForm=_c[1];
  var _d=useState(null),msg=_d[0],setMsg=_d[1];
  var adm=getAdmin();
  var _e=useState({nombre:adm.nombre,username:adm.username,password:adm.password}),perfil=_e[0],setPerfil=_e[1];
  var _f=useState(null),perfilMsg=_f[0],setPerfilMsg=_f[1];

  function save(u){setUsers(u);sl('users',u);}
  function F(k,v){setForm(function(f){return Object.assign({},f,{[k]:v});});}
  function FP(k,v){setPerfil(function(f){return Object.assign({},f,{[k]:v});});}
  function flash(t,m){setMsg({t:t,m:m});setTimeout(function(){setMsg(null);},3000);}
  function flashP(t,m){setPerfilMsg({t:t,m:m});setTimeout(function(){setPerfilMsg(null);},3000);}

  function handleSave(){
    if(!form.nombre.trim()||!form.username.trim()||!form.password.trim()){flash('err','Nombre, usuario y contraseña son obligatorios.');return;}
    var adm2=getAdmin();
    if(form.username.toUpperCase()===adm2.username.toUpperCase()&&form.id!==adm2.id){flash('err','Nombre de usuario ya existe.');return;}
    var others=users.filter(function(u){return u.id!==form.id;});
    if(others.find(function(u){return u.username.toUpperCase()===form.username.toUpperCase();})){flash('err','Nombre de usuario ya existe.');return;}
    if(modal==='new')save(users.concat([Object.assign({},form,{id:uid()})]));
    else save(users.map(function(u){return u.id===form.id?Object.assign({},form):u;}));
    setModal(null);flash('ok','Usuario guardado.');
  }

  function handleSavePerfil(){
    if(!perfil.nombre.trim()||!perfil.username.trim()||!perfil.password.trim()){flashP('err','Todos los campos son obligatorios.');return;}
    if(perfil.password.length<4){flashP('err','Contraseña mínimo 4 caracteres.');return;}
    if(users.find(function(u){return u.username.toUpperCase()===perfil.username.toUpperCase();})){flashP('err','Nombre de usuario ya existe.');return;}
    sl('adminProfile',{nombre:perfil.nombre.trim(),username:perfil.username.trim(),password:perfil.password});
    props.setUser(getAdmin());
    flashP('ok','Perfil actualizado.');
  }

  return E('div',null,
    E('div',{className:'card'},
      E('div',{className:'card-title'},'🔐 Mi Perfil (Administrador)'),
      perfilMsg&&E(Alert,{t:perfilMsg.t,msg:perfilMsg.m,onClose:function(){setPerfilMsg(null);}}),
      E('div',{className:'grid2'},
        E('div',{className:'fg'},E('label',null,'Nombre'),E('input',{className:'fi',value:perfil.nombre,onChange:function(e){FP('nombre',e.target.value);}})),
        E('div',{className:'fg'},E('label',null,'Usuario'),E('input',{className:'fi',value:perfil.username,onChange:function(e){FP('username',e.target.value);}}))
      ),
      E('div',{className:'fg',style:{maxWidth:300}},E('label',null,'Contraseña'),E('input',{className:'fi',type:'text',value:perfil.password,onChange:function(e){FP('password',e.target.value);}})),
      E('button',{className:'btn pri',onClick:handleSavePerfil},'💾 Guardar Perfil')
    ),
    E('div',{className:'card'},
      E('div',{className:'card-hd'},
        E('div',{className:'card-title'},'👤 Usuarios del Sistema'),
        E('button',{className:'btn pri',onClick:function(){setForm({nombre:'',username:'',password:'',role:'preventista',activo:true});setModal('new');}},'+ Nuevo')
      ),
      msg&&E(Alert,{t:msg.t,msg:msg.m,onClose:function(){setMsg(null);}}),
      E('div',{className:'tw'},E('table',null,
        E('thead',null,E('tr',null,E('th',null,'Nombre'),E('th',null,'Usuario'),E('th',null,'Rol'),E('th',null,'Estado'),E('th',null,'Acciones'))),
        E('tbody',null,[Object.assign({},getAdmin(),{_fixed:true})].concat(users).map(function(u){
          return E('tr',{key:u.id},
            E('td',null,E('strong',null,u.nombre)),E('td',null,u.username),
            E('td',null,E('span',{className:'badge '+u.role},roleLabel(u.role))),
            E('td',null,E('span',{className:'badge '+(u._fixed||u.activo?'on':'off')},u._fixed||u.activo?'Activo':'Inactivo')),
            E('td',null,u._fixed?E('span',{style:{fontSize:12,color:'var(--txt2)'}},'Editar en Mi Perfil'):
              E('div',{className:'brow'},
                E('button',{className:'btn sm',onClick:function(){setForm(Object.assign({},u));setModal('edit');}},'✏️'),
                E('button',{className:'btn sm '+(u.activo?'warn':'ok'),onClick:function(){save(users.map(function(x){return x.id===u.id?Object.assign({},x,{activo:!x.activo}):x;}));}},u.activo?'🔴 Desactivar':'🟢 Activar'),
                E('button',{className:'btn sm dan',onClick:function(){if(confirm('¿Eliminar?'))save(users.filter(function(x){return x.id!==u.id;}));}},'Eliminar')
              )
            )
          );
        }))
      ))
    ),
    modal&&E(Modal,{title:modal==='new'?'Nuevo Usuario':'Editar Usuario',onClose:function(){setModal(null);}},
      E('div',{className:'grid2'},
        E('div',{className:'fg'},E('label',null,'Nombre ',E('em',null,'*')),E('input',{className:'fi',value:form.nombre,onChange:function(e){F('nombre',e.target.value);}})),
        E('div',{className:'fg'},E('label',null,'Usuario ',E('em',null,'*')),E('input',{className:'fi',value:form.username,onChange:function(e){F('username',e.target.value);}}))
      ),
      E('div',{className:'fg'},E('label',null,'Contraseña ',E('em',null,'*')),E('input',{className:'fi',value:form.password,onChange:function(e){F('password',e.target.value);},placeholder:'Mín. 4 caracteres'})),
      E('div',{className:'grid2'},
        E('div',{className:'fg'},E('label',null,'Rol'),
          E('select',{className:'fs',value:form.role,onChange:function(e){F('role',e.target.value);}},
            E('option',{value:'preventista'},'Preventista'),
            E('option',{value:'preparador'},'Preparador'),
            E('option',{value:'coadmin'},'Co-Administrador'),
            E('option',{value:'admin'},'Administrador')
          )
        ),
        E('div',{className:'fg'},E('label',null,'Estado'),
          E('select',{className:'fs',value:form.activo?'1':'0',onChange:function(e){F('activo',e.target.value==='1');}},
            E('option',{value:'1'},'Activo'),E('option',{value:'0'},'Inactivo')
          )
        )
      ),
      E('div',{className:'alert warn',style:{fontSize:12}},
        E('span',null,E('strong',null,'Roles: '),'Preventista → crea pedidos y los entrega. Preparador → arma pedidos. Co-Admin → gestión completa. Admin → acceso total.')
      ),
      E('div',{className:'brow',style:{marginTop:18}},
        E('button',{className:'btn pri',onClick:handleSave,style:{flex:1}},'Guardar'),
        E('button',{className:'btn',onClick:function(){setModal(null);},style:{flex:1}},'Cancelar')
      )
    )
  );
}

/* ═══════════════════════════
   CONFIGURACIÓN
═══════════════════════════ */
function Configuracion(){
  var _a=useState(gl('cfg',{descGlobal:5,descXUser:{}})),cfg=_a[0],setCfg=_a[1];
  var _b=useState(null),msg=_b[0],setMsg=_b[1];
  var users=gl('users',[]);

  function saveCfg(c){setCfg(c);sl('cfg',c);}
  function flash(t,m){setMsg({t:t,m:m});setTimeout(function(){setMsg(null);},3000);}
  function setDescGlobal(v){saveCfg(Object.assign({},cfg,{descGlobal:parseFloat(v)||0}));}
  function setUserDesc(uid,field,val){
    var dx=Object.assign({},cfg.descXUser||{});
    dx[uid]=Object.assign({},dx[uid]||{});
    dx[uid][field]=field==='deshabilitado'?val:parseFloat(val)||0;
    saveCfg(Object.assign({},cfg,{descXUser:dx}));
  }

  function doBackup(){
    exportXLSX([
      {name:'Artículos',rows:gl('arts',[]).map(function(a){return{'Código':a.cod,'Descripción':a.desc,'Precio Costo':a.costo||0,'Precio Base':a.precio,'Estado':a.estado};})},
      {name:'Clientes',rows:gl('clis',[]).map(function(c){return{'Nombre':c.nombre+' '+c.apellido,'Domicilio':c.dir,'Tel':c.tel,'Tipo CC':c.tipoCC,'Deuda':c.deuda};})},
      {name:'Pedidos',rows:gl('pedidos',[]).map(function(p){return{'N°':p.nPedido,'Fecha':p.fecha,'Estado':estadoLabel(p.estado),'Preventista':p.preventistaNombre,'Cliente':p.cliente.nombre+' '+p.cliente.apellido,'Total':p.total,'Pago':p.formaPago||''};})},
      {name:'Usuarios',rows:gl('users',[]).map(function(u){return{'Nombre':u.nombre,'Usuario':u.username,'Rol':roleLabel(u.role),'Activo':u.activo?'Sí':'No'};})},
    ],'backup_alista_'+todayStr().replace(/\//g,'-')+'.xlsx');
    flash('ok','Respaldo exportado.');
  }

  return E('div',null,
    msg&&E(Alert,{t:msg.t,msg:msg.m,onClose:function(){setMsg(null);}}),
    E('div',{className:'card',style:{maxWidth:560}},
      E('div',{className:'card-title'},'⚙️ Configuración General'),
      E('div',{className:'fg'},
        E('label',null,'Descuento Máximo Global (%)'),
        E('input',{className:'fi',type:'number',min:0,max:50,step:0.5,value:cfg.descGlobal,onChange:function(e){setDescGlobal(e.target.value);},style:{maxWidth:160}}),
        E('div',{style:{fontSize:12,color:'var(--txt2)',marginTop:4}},'Aplica a todos los preventistas salvo que tengan configuración individual.')
      )
    ),
    users.length>0&&E('div',{className:'card'},
      E('div',{className:'card-title'},'👤 Descuento por Preventista'),
      E('div',{className:'tw'},E('table',null,
        E('thead',null,E('tr',null,E('th',null,'Usuario'),E('th',null,'Rol'),E('th',null,'% Descuento'),E('th',null,'Estado'))),
        E('tbody',null,users.filter(function(u){return u.role==='preventista'||u.role==='coadmin';}).map(function(u){
          var ux=(cfg.descXUser||{})[u.id]||{};
          return E('tr',{key:u.id},
            E('td',null,E('strong',null,u.nombre)),
            E('td',null,E('span',{className:'badge '+u.role},roleLabel(u.role))),
            E('td',null,E('div',{style:{display:'flex',alignItems:'center',gap:8}},
              E('input',{type:'number',min:0,max:50,step:0.5,value:typeof ux.max==='number'?ux.max:'',
                placeholder:'Global ('+cfg.descGlobal+'%)',
                onChange:function(e){setUserDesc(u.id,'max',e.target.value);},
                style:{width:110,padding:'5px 8px',border:'1.5px solid var(--border)',borderRadius:6,fontFamily:'inherit'}}),'%'
            )),
            E('td',null,E('label',{style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer'}},
              E('input',{type:'checkbox',checked:!ux.deshabilitado,onChange:function(e){setUserDesc(u.id,'deshabilitado',!e.target.checked);}}),
              ux.deshabilitado?'Deshabilitado':'Habilitado'
            ))
          );
        }))
      ))
    ),
    E('div',{className:'card',style:{maxWidth:560}},
      E('div',{className:'card-title'},'💾 Respaldo de Datos'),
      E('p',{style:{fontSize:13,color:'var(--txt2)',marginBottom:14}},'Exporta todos los datos del sistema en un archivo Excel.'),
      E('button',{className:'btn pri',onClick:doBackup},'📥 Exportar Respaldo Completo')
    )
  );
}

   APP ROOT
═══════════════════════════ */
/* ═══════════════════════════
   BOTTOM NAV (mobile)
═══════════════════════════ */
function BottomNav(props){
  var user=props.user;
  var mod=props.mod;
  var setMod=props.setMod;
  var isPrev=user.role==='preventista';
  var isPrep=user.role==='preparador';
  var isAdminOrCo=user.role==='admin'||user.role==='coadmin';
  var pedidos=gl('pedidos',[]);
  var pendCount=pedidos.filter(function(p){return p.estado==='pendiente';}).length;
  var readyCount=pedidos.filter(function(p){return p.estado==='preparado'&&p.preventistaId===user.id;}).length;

  function item(id,icon,label,badge){
    return E('button',{key:id,className:'bn-item'+(mod===id?' on':''),onClick:function(){setMod(id);}},
      badge>0&&E('span',{className:'bn-dot'}),
      E('span',{className:'bn-icon'},icon),
      E('span',null,label)
    );
  }

  if(isPrev) return E('div',{className:'bottom-nav'},
    item('dashboard','📊','Inicio'),
    item('nuevo-pedido','🛒','Pedido'),
    item('mis-pedidos','📦','Mis Pedidos',readyCount),
    item('clientes','👥','Clientes'),
    item('mapa-gps','🗺️','GPS')
  );

  if(isPrep) return E('div',{className:'bottom-nav'},
    item('dashboard','📊','Inicio'),
    item('cola-prep','⚙️','Preparar',pendCount),
    item('articulos','📦','Artículos')
  );

  if(isAdminOrCo) return E('div',{className:'bottom-nav'},
    item('dashboard','📊','Inicio'),
    item('nuevo-pedido','🛒','Pedido'),
    item('todos-pedidos','📋','Pedidos'),
    item('clientes','👥','Clientes'),
    item('estadisticas','📈','Stats')
  );

  return null;
}

var MOD_TITLES={
  'dashboard':'Dashboard','nuevo-pedido':'Nuevo Pedido','mis-pedidos':'Mis Pedidos',
  'mapa-gps':'Mi Recorrido GPS','cola-prep':'Cola de Preparación',
  'todos-pedidos':'Todos los Pedidos','mapa-admin':'Mapa de Preventistas',
  'clientes':'Clientes','articulos':'Artículos','cuentas-corrientes':'Cuentas Corrientes',
  'estadisticas':'Estadísticas','comisiones':'Comisiones','usuarios':'Usuarios','configuracion':'Configuración'
};

function App(){
  var _a=useState(null),user=_a[0],setUser=_a[1];
  var _b=useState('dashboard'),mod=_b[0],setMod=_b[1];
  var _c=useState(false),sbOpen=_c[0],setSbOpen=_c[1];

  useEffect(function(){boot();},[]);

  if(!user)return E(Login,{onLogin:setUser});

  var isAdmin=user.role==='admin';
  var isAdminOrCo=user.role==='admin'||user.role==='coadmin';
  var isPrev=user.role==='preventista';
  var isPrep=user.role==='preparador';

  function goMod(m){setMod(m);setSbOpen(false);}

  function renderMod(){
    if(mod==='dashboard')return E(Dashboard,{user:user});
    if(mod==='nuevo-pedido'&&(isPrev||isAdminOrCo))return E(NuevoPedido,{user:user});
    if(mod==='mis-pedidos'&&isPrev)return E(MisPedidos,{user:user});
    if(mod==='mapa-gps'&&isPrev)return E(MapaGPS,{user:user});
    if(mod==='cola-prep'&&isPrep)return E(ColaPreparacion,{user:user});
    if(mod==='todos-pedidos'&&isAdminOrCo)return E(TodosPedidos,null);
    if(mod==='mapa-admin'&&isAdminOrCo)return E(MapaAdmin,null);
    if(mod==='clientes')return E(Clientes,{user:user});
    if(mod==='articulos')return E(Articulos,{user:user});
    if(mod==='cuentas-corrientes'&&isAdminOrCo)return E(CuentasCorrientes,null);
    if(mod==='estadisticas'&&isAdminOrCo)return E(Estadisticas,null);
    if(mod==='comisiones'&&isAdminOrCo)return E(Comisiones,null);
    if(mod==='usuarios'&&isAdmin)return E(Usuarios,{setUser:setUser});
    if(mod==='configuracion'&&isAdminOrCo)return E(Configuracion,null);
    return E('div',{className:'empty'},'Módulo no disponible para tu rol.');
  }

  return E('div',{className:'app'},
    sbOpen&&E('div',{className:'sb-overlay open',onClick:function(){setSbOpen(false);}}),
    E(Sidebar,{user:user,mod:mod,setMod:goMod,isOpen:sbOpen,
      onLogout:function(){setUser(null);setMod('dashboard');setSbOpen(false);}}),
    E('div',{className:'main'},
      E('div',{className:'topbar'},
        E('div',{style:{display:'flex',alignItems:'center',gap:8}},
          E('button',{className:'hamburger',onClick:function(){setSbOpen(!sbOpen);}},'☰'),
          E('div',{className:'topbar-title'},MOD_TITLES[mod]||mod)
        ),
        E('div',{className:'topbar-right'},
          E('button',{
            onClick:function(){setSbOpen(!sbOpen);},
            style:{background:'none',border:'none',cursor:'pointer',fontSize:13,
              color:'var(--blue)',fontWeight:700,padding:'6px 10px',
              display:'flex',alignItems:'center',gap:4}
          },'⚙️ Más'),
          E('button',{
            onClick:function(){setUser(null);setMod('dashboard');setSbOpen(false);},
            style:{background:'none',border:'none',cursor:'pointer',fontSize:13,
              color:'var(--txt2)',padding:'6px 8px'}
          },'Salir')
        )
      ),
      E('div',{className:'page'},renderMod()),
      E(BottomNav,{user:user,mod:mod,setMod:goMod})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(E(App));
</script>
